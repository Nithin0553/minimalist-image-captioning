name: quality

on:
  workflow_dispatch:
  push:
    branches: [main, "agent/**"]
  pull_request:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: astral-sh/setup-uv@v9.0.0
        with:
          enable-cache: true
          prune-cache: true
      - run: uv sync --frozen --extra dev
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run ty check
      - run: uv run basedpyright
      - run: uv run minimal-caption submission-check --config configs/default.yaml
      - run: uv run pytest --cov=minimal_captioning --cov-branch --cov-report=term-missing
      - run: uv build
