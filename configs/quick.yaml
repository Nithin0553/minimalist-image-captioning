seed: 42

data:
  root: data/flickr8k
  images_dir: Images
  captions_file: captions.txt
  min_word_frequency: 2
  max_caption_length: 24
  train_ratio: 0.8
  validation_ratio: 0.1
  test_ratio: 0.1
  num_workers: 0
  max_train_images: 256
  max_validation_images: 64
  max_test_images: 64

model:
  dip_mode: sobel
  resize_size: 256
  image_size: 224
  sobel_blend: 0.35
  gaussian_kernel_size: 5
  gaussian_sigma: 1.2
  embedding_dim: 128
  latent_dim: 6
  pretrained_resnet: true

training:
  epochs: 2
  batch_size: 16
  learning_rate: 0.001
  weight_decay: 0.0001
  gradient_clip: 5.0
  early_stopping_patience: 2
  device: auto

evaluation:
  batch_size: 16
  max_generation_length: 24
  tsne_max_images: 64
  gaussian_noise_std: [0.10]
  salt_pepper_amount: [0.03]

paths:
  outputs: outputs/quick
  checkpoints: checkpoints/quick
  artifacts: artifacts/quick
  screenshots: screenshots/quick
